<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮克敏菇菇重生計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto+Sans+TC', sans-serif;
            background-color: #f0fdf4;
        }
        .mushroom-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .mushroom-card:focus-within {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1);
        }
        /* 隱藏數字輸入框箭頭 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .modal-enter { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .list-move { transition: transform 0.5s; }
    </style>
</head>
<body class="p-4 md:p-8 relative min-h-screen">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="bg-white rounded-3xl p-6 mb-8 shadow-sm border border-green-100 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-green-800 flex items-center gap-2">
                    <span class="text-3xl">🍄</span> 皮克敏菇菇追蹤器
                </h1>
                <p class="text-green-600 text-sm mt-1">重生機制：破壞後 5 分鐘生成</p>
            </div>
            <div class="flex flex-wrap justify-center md:justify-end items-center gap-3">
                <div class="text-right">
                    <div class="text-sm text-gray-500 uppercase tracking-wider">目前時間</div>
                    <div id="current-time" class="text-2xl font-mono font-bold text-gray-800">00:00:00</div>
                </div>
                <button id="notif-btn" onclick="requestNotifPermission()" class="flex items-center gap-1 text-xs px-4 py-2 bg-blue-500 text-white rounded-full hover:bg-blue-600 transition-all shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                    <span id="notif-btn-text">開啟通知</span>
                </button>
                <button onclick="addLocation()" class="flex items-center gap-1 text-xs px-4 py-2 bg-green-600 text-white rounded-full hover:bg-green-700 transition-all shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    新增標點
                </button>
            </div>
        </div>

        <!-- Info Tooltip -->
        <div class="bg-blue-50 border-l-4 border-blue-400 p-4 mb-6 rounded-r-lg flex justify-between items-center">
            <div class="flex">
                <div class="flex-shrink-0 text-blue-400">
                    <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1-2 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                    </svg>
                </div>
                <div class="ml-3">
                    <p class="text-sm text-blue-700">
                        點擊卡片標題可<b>修改名稱</b>。系統會自動依照重生時間先後進行排序。
                    </p>
                </div>
            </div>
        </div>

        <!-- Grid Container -->
        <div id="mushroom-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Cards will be generated here -->
        </div>

        <!-- Footer -->
        <footer class="mt-12 text-center text-gray-400 text-xs pb-8">
            <p>本工具僅供玩家計算參考使用 | 支援動態排序與地點編輯</p>
        </footer>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-4 right-4 bg-gray-800 text-white px-4 py-2 rounded-lg opacity-0 transition-opacity duration-300 pointer-events-none z-50">
        已複製時間！
    </div>

    <!-- Alert Modal Container -->
    <div id="alert-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl modal-enter">
            <div class="text-5xl mb-4">🍄</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">準備打菇菇！</h2>
            <p id="modal-msg" class="text-gray-600 mb-6"></p>
            <button onclick="closeModal()" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700 transition-colors shadow-lg shadow-green-200">
                我知道了
            </button>
        </div>
    </div>

    <script>
        // 初始化地點資料
        let locations = [
            { id: self.crypto.randomUUID(), name: "唐獅子", h: '', m: '', s: '', spawnTime: null, notified: false },
            { id: self.crypto.randomUUID(), name: "景福宮", h: '', m: '', s: '', spawnTime: null, notified: false },
            { id: self.crypto.randomUUID(), name: "景福宮石燈", h: '', m: '', s: '', spawnTime: null, notified: false },
            { id: self.crypto.randomUUID(), name: "集英里公告欄右瓢蟲", h: '', m: '', s: '', spawnTime: null, notified: false },
            { id: self.crypto.randomUUID(), name: "新光獅", h: '', m: '', s: '', spawnTime: null, notified: false },
            { id: self.crypto.randomUUID(), name: "流水藝術裝置", h: '', m: '', s: '', spawnTime: null, notified: false },
            { id: self.crypto.randomUUID(), name: "晴光商圈 Flower Tower", h: '', m: '', s: '', spawnTime: null, notified: false },
            { id: self.crypto.randomUUID(), name: "中山國小站2號出口", h: '', m: '', s: '', spawnTime: null, notified: false },
            { id: self.crypto.randomUUID(), name: "妙道院", h: '', m: '', s: '', spawnTime: null, notified: false },
            { id: self.crypto.randomUUID(), name: "集客獅", h: '', m: '', s: '', spawnTime: null, notified: false },
            { id: self.crypto.randomUUID(), name: "吉林路美食", h: '', m: '', s: '', spawnTime: null, notified: false },
            { id: self.crypto.randomUUID(), name: "薇閣精品旅館", h: '', m: '', s: '', spawnTime: null, notified: false }
        ];

        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false });
            document.getElementById('current-time').textContent = timeStr;
            checkNotifications(now);
        }

        setInterval(updateClock, 1000);
        updateClock();

        window.onload = () => {
            updateNotifButtonUI();
            renderCards();
        };

        function renderCards() {
            const grid = document.getElementById('mushroom-grid');
            
            // 排序邏輯：有時間的排前面，且按照時間先後排序；沒時間的排後面
            const sortedLocations = [...locations].sort((a, b) => {
                if (a.spawnTime && b.spawnTime) return a.spawnTime - b.spawnTime;
                if (a.spawnTime) return -1;
                if (b.spawnTime) return 1;
                return 0;
            });

            grid.innerHTML = '';
            sortedLocations.forEach((loc) => {
                const card = document.createElement('div');
                card.className = 'mushroom-card bg-white rounded-2xl p-5 border border-gray-100 shadow-sm hover:border-green-300';
                card.dataset.id = loc.id;
                
                const timeText = loc.spawnTime 
                    ? `${loc.spawnTime.getHours().toString().padStart(2, '0')}:${loc.spawnTime.getMinutes().toString().padStart(2, '0')}:${loc.spawnTime.getSeconds().toString().padStart(2, '0')}`
                    : "-- : -- : --";
                
                const resultColor = loc.spawnTime ? "text-green-600" : "text-gray-300";

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3 gap-2">
                        <input type="text" value="${loc.name}" 
                               onchange="updateName('${loc.id}', this.value)"
                               class="font-bold text-gray-800 leading-tight bg-transparent border-b border-transparent focus:border-green-500 outline-none w-full py-1 transition-all" 
                               placeholder="輸入地點名稱">
                        <button onclick="deleteLocation('${loc.id}')" class="text-gray-300 hover:text-red-500 transition-colors p-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs text-gray-400 mb-2 font-medium">剩餘時間 (時/分/秒)</label>
                            <div class="flex items-center gap-2">
                                <input type="number" value="${loc.h}" placeholder="時" 
                                       oninput="handleInput('${loc.id}', 'h', this.value)"
                                       class="w-full bg-gray-50 border border-gray-200 rounded-lg px-1 py-2 text-center text-sm focus:ring-2 focus:ring-green-500 outline-none">
                                <input type="number" value="${loc.m}" placeholder="分" 
                                       oninput="handleInput('${loc.id}', 'm', this.value)"
                                       class="w-full bg-gray-50 border border-gray-200 rounded-lg px-1 py-2 text-center text-sm focus:ring-2 focus:ring-green-500 outline-none">
                                <input type="number" value="${loc.s}" placeholder="秒" 
                                       oninput="handleInput('${loc.id}', 's', this.value)"
                                       class="w-full bg-gray-50 border border-gray-200 rounded-lg px-1 py-2 text-center text-sm focus:ring-2 focus:ring-green-500 outline-none">
                            </div>
                        </div>
                        <div class="pt-3 border-t border-dashed border-gray-100">
                            <div class="text-xs text-gray-400">預計下次生成時間</div>
                            <div class="flex items-center justify-between mt-1">
                                <div id="result-${loc.id}" class="text-xl font-mono font-bold ${resultColor}">${timeText}</div>
                                <button onclick="copyTime('${loc.id}')" class="text-gray-300 hover:text-green-500 transition-colors p-1">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 處理輸入，為了不讓排序在打字時干擾焦點，使用更靈活的更新策略
        function handleInput(id, field, value) {
            const loc = locations.find(l => l.id === id);
            if (!loc) return;
            
            loc[field] = value;
            
            const h = parseInt(loc.h) || 0;
            const m = parseInt(loc.m) || 0;
            const s = parseInt(loc.s) || 0;

            if (loc.h === '' && loc.m === '' && loc.s === '') {
                loc.spawnTime = null;
                loc.notified = false;
            } else {
                const totalSeconds = (h * 3600) + (m * 60) + s;
                const now = new Date();
                loc.spawnTime = new Date(now.getTime() + (totalSeconds + 300) * 1000);
                loc.notified = false;
            }

            // 更新單個卡片的 UI 顯示而不重新渲染整個列表 (避免焦點丟失)
            const resultEl = document.getElementById(`result-${id}`);
            if (loc.spawnTime) {
                const hoursStr = loc.spawnTime.getHours().toString().padStart(2, '0');
                const minsStr = loc.spawnTime.getMinutes().toString().padStart(2, '0');
                const secsStr = loc.spawnTime.getSeconds().toString().padStart(2, '0');
                resultEl.textContent = `${hoursStr}:${minsStr}:${secsStr}`;
                resultEl.className = "text-xl font-mono font-bold text-green-600";
            } else {
                resultEl.textContent = "-- : -- : --";
                resultEl.className = "text-xl font-mono font-bold text-gray-300";
            }

            // 使用防抖或在失焦後排序 (這裡選用延時觸發排序，給用戶輸入緩衝)
            clearTimeout(window.sortTimeout);
            window.sortTimeout = setTimeout(() => {
                renderCards();
            }, 3000); // 3秒無動作後自動排序
        }

        function updateName(id, newName) {
            const loc = locations.find(l => l.id === id);
            if (loc) loc.name = newName;
        }

        function addLocation() {
            const newLoc = {
                id: self.crypto.randomUUID(),
                name: "新地點",
                h: '', m: '', s: '',
                spawnTime: null,
                notified: false
            };
            locations.unshift(newLoc);
            renderCards();
        }

        function deleteLocation(id) {
            locations = locations.filter(l => l.id !== id);
            renderCards();
        }

        function checkNotifications(now) {
            locations.forEach(loc => {
                if (!loc.spawnTime || loc.notified) return;

                const diffSecs = Math.floor((loc.spawnTime.getTime() - now.getTime()) / 1000);

                if (diffSecs <= 120 && diffSecs > 0) {
                    triggerAlert(loc.name);
                    loc.notified = true;
                }
            });
        }

        function triggerAlert(locationName) {
            if (Notification.permission === "granted") {
                const n = new Notification("菇菇重生提醒", {
                    body: `【${locationName}】即將在 2 分鐘後重生！`,
                    icon: "https://cdn-icons-png.flaticon.com/512/3579/3579130.png",
                    requireInteraction: true
                });
                n.onclick = () => { window.focus(); n.close(); };
            }

            playBeep();
            const modal = document.getElementById('alert-modal');
            const msg = document.getElementById('modal-msg');
            msg.innerHTML = `<span class="font-bold text-green-600">${locationName}</span><br>即將在 2 分鐘後重生。`;
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('alert-modal').style.display = 'none';
        }

        function requestNotifPermission() {
            if (!("Notification" in window)) return;
            Notification.requestPermission().then(() => updateNotifButtonUI());
        }

        function updateNotifButtonUI() {
            const btn = document.getElementById('notif-btn');
            const btnText = document.getElementById('notif-btn-text');
            if (Notification.permission === "granted") {
                btn.className = "flex items-center gap-1 text-xs px-4 py-2 bg-green-100 text-green-700 rounded-full cursor-default";
                btnText.textContent = "通知已開啟";
                btn.onclick = null;
            }
        }

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1.5);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 1.5);
            } catch (e) {}
        }

        function copyTime(id) {
            const el = document.getElementById(`result-${id}`);
            const text = el ? el.textContent : "";
            if (text.includes("--")) return;
            
            const dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);

            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }
    </script>
</body>
</html>
