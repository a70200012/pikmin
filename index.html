<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮克敏菇菇重生計算器 (雲端儲存版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto+Sans+TC', sans-serif;
            background-color: #f0fdf4;
            overflow-x: hidden;
        }
        .mushroom-card {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s;
        }
        /* 拖曳中的本體 */
        .mushroom-card.dragging {
            opacity: 0.2;
            transform: scale(0.95);
        }
        /* 隱藏數字輸入框箭頭 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
        }
        .modal-enter { animation: scaleUp 0.3s ease-out; }
        @keyframes scaleUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .drag-handle {
            cursor: grab;
            color: #d1d5db;
            touch-action: none;
        }
        .drag-handle:active {
            cursor: grabbing;
        }
        /* 拖曳中的視覺輔助 */
        .sortable-ghost {
            opacity: 0;
        }
    </style>
</head>
<body class="p-4 md:p-8 relative min-h-screen pb-24">
    <div class="max-w-4xl mx-auto">
        <!-- 標頭區 -->
        <div class="bg-white rounded-3xl p-6 mb-8 shadow-sm border border-green-100 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-green-800 flex items-center gap-2">
                    <span class="text-3xl">🍄</span> 皮克敏菇菇追蹤器
                </h1>
                <div class="flex items-center gap-2 mt-1">
                    <p class="text-green-600 text-sm">重生機制：+5 分鐘</p>
                    <span id="sync-status" class="text-[10px] px-2 py-0.5 bg-gray-100 text-gray-500 rounded-full flex items-center gap-1 transition-all">
                        <span class="w-1.5 h-1.5 rounded-full bg-gray-400"></span> 連線中...
                    </span>
                </div>
            </div>
            <div class="flex flex-wrap justify-center md:justify-end items-center gap-3">
                <div class="text-right">
                    <div class="text-sm text-gray-500 uppercase tracking-wider">目前時間</div>
                    <div id="current-time" class="text-2xl font-mono font-bold text-gray-800">00:00:00</div>
                </div>
                <button id="notif-btn" onclick="window.toggleNotification()" class="flex items-center gap-2 text-xs px-4 py-2 rounded-full transition-all shadow-md font-medium">
                    <span id="notif-dot" class="w-2 h-2 rounded-full bg-gray-400"></span>
                    <span id="notif-text">偵測通知權限...</span>
                </button>
                <button onclick="window.addLocation()" class="flex items-center gap-1 text-xs px-4 py-2 bg-green-600 text-white rounded-full hover:bg-green-700 transition-all shadow-md font-medium">
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                    新增標點
                </button>
            </div>
        </div>

        <!-- 卡片容器 -->
        <div id="mushroom-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 min-h-[200px]">
            <div id="loading-state" class="col-span-full py-24 text-center text-gray-400 flex flex-col items-center gap-4">
                <div class="w-8 h-8 border-4 border-green-200 border-t-green-600 rounded-full animate-spin"></div>
                <p>正在載入您的標點資料...</p>
            </div>
        </div>

        <footer class="mt-12 text-center text-gray-400 text-xs">
            <p id="user-id-display" class="opacity-50">驗證中...</p>
        </footer>
    </div>

    <!-- 刪除確認視窗 -->
    <div id="delete-modal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4 modal-overlay">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl modal-enter border border-red-50 border-t-4 border-t-red-500">
            <div class="text-center">
                <div class="bg-red-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-red-500">
                    <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                </div>
                <h3 class="text-xl font-bold text-gray-800 mb-2">確定要刪除嗎？</h3>
                <p class="text-gray-500 mb-6 text-sm">刪除後此標點的設定將無法找回。</p>
                <div class="flex gap-3">
                    <button onclick="window.closeDeleteModal()" class="flex-1 px-4 py-3 bg-gray-100 text-gray-600 rounded-2xl font-bold hover:bg-gray-200 transition-colors">取消</button>
                    <button id="confirm-delete-btn" class="flex-1 px-4 py-3 bg-red-500 text-white rounded-2xl font-bold hover:bg-red-600 transition-all shadow-lg shadow-red-100">確認刪除</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 菇菇通知視窗 -->
    <div id="alert-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-overlay">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl modal-enter border-t-8 border-t-green-500">
            <div class="text-6xl mb-4">🍄</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">準備打菇菇！</h2>
            <p id="modal-msg" class="text-gray-600 mb-6"></p>
            <button onclick="window.closeAlertModal()" class="w-full bg-green-600 text-white font-bold py-3 rounded-2xl hover:bg-green-700 transition-all shadow-lg shadow-green-100">我知道了</button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900/90 text-white px-6 py-3 rounded-full opacity-0 transition-opacity duration-300 pointer-events-none z-[200] text-sm backdrop-blur-md shadow-xl">
        時間已複製！
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let app, auth, db, appId, currentUser;
        let locations = [];
        let isCloudMode = false;
        let deleteTargetId = null;
        let draggedElement = null;
        let isNotifEnabled = localStorage.getItem('notif_enabled') !== 'false'; 

        async function init() {
            try {
                const config = JSON.parse(__firebase_config);
                app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        isCloudMode = true;
                        document.getElementById('user-id-display').textContent = `用戶 ID: ${user.uid}`;
                        setSyncStatus('online');
                        updateNotifUI();
                        subscribeToData(user.uid);
                    }
                });
            } catch (e) {
                startOfflineMode();
            }
        }

        function startOfflineMode() {
            isCloudMode = false;
            setSyncStatus('offline');
            updateNotifUI();
            const saved = localStorage.getItem('pikmin_locations_v2');
            if (saved) {
                locations = JSON.parse(saved).map(l => ({ ...l, spawnTime: l.spawnTimestamp ? new Date(l.spawnTimestamp) : null }));
                renderCards();
            } else {
                initializeDefaultData();
            }
        }

        function subscribeToData(uid) {
            const col = collection(db, 'artifacts', appId, 'users', uid, 'locations');
            onSnapshot(col, (snap) => {
                const loader = document.getElementById('loading-state');
                if (loader) loader.remove();

                // 核心修復：如果用戶正在打字，不要重新渲染整頁，只更新背景資料
                const activeEl = document.activeElement;
                const isTyping = activeEl && activeEl.tagName === 'INPUT';

                const newLocations = snap.docs.map(d => ({
                    id: d.id,
                    ...d.data(),
                    spawnTime: d.data().spawnTimestamp ? new Date(d.data().spawnTimestamp) : null
                })).sort((a, b) => (a.order || 0) - (b.order || 0));

                if (snap.empty) {
                    initializeDefaultData(uid);
                } else {
                    locations = newLocations;
                    if (!isTyping && !draggedElement) {
                        renderCards();
                    }
                }
            }, () => startOfflineMode());
        }

        async function initializeDefaultData(uid = null) {
            const defaults = ["唐獅子", "景福宮", "景福宮石燈", "集英里公告欄右瓢蟲", "新光獅", "流水藝術裝置", "晴光商圈 Flower Tower", "中山國小站2號出口", "妙道院", "集客獅", "吉林路美食", "薇閣精品旅館"];
            const temp = defaults.map((name, i) => ({
                id: crypto.randomUUID(),
                name, h: '', m: '', s: '',
                spawnTimestamp: null, notified: false,
                order: i, createdAt: Date.now()
            }));

            if (isCloudMode && uid) {
                for (const loc of temp) {
                    await setDoc(doc(db, 'artifacts', appId, 'users', uid, 'locations', loc.id), loc);
                }
            } else {
                locations = temp.map(l => ({ ...l, spawnTime: null }));
                saveLocal();
                renderCards();
            }
        }

        function saveLocal() {
            if (!isCloudMode) localStorage.setItem('pikmin_locations_v2', JSON.stringify(locations));
        }

        function setupDragEvents(card) {
            card.addEventListener('dragstart', (e) => {
                draggedElement = card;
                e.dataTransfer.effectAllowed = 'move';
                setTimeout(() => card.classList.add('dragging'), 0);
            });

            card.addEventListener('dragend', () => {
                card.classList.remove('dragging');
                draggedElement = null;
                saveNewOrder();
            });

            card.addEventListener('dragover', (e) => {
                e.preventDefault();
                if (card === draggedElement) return;
                
                const grid = document.getElementById('mushroom-grid');
                const children = [...grid.children];
                const draggedIndex = children.indexOf(draggedElement);
                const targetIndex = children.indexOf(card);

                // 增加直覺感：即時改變 DOM 位置
                if (draggedIndex < targetIndex) {
                    grid.insertBefore(draggedElement, card.nextSibling);
                } else {
                    grid.insertBefore(draggedElement, card);
                }
            });
        }

        async function saveNewOrder() {
            const grid = document.getElementById('mushroom-grid');
            const newLocations = [];
            [...grid.children].forEach((cardEl, i) => {
                const id = cardEl.dataset.id;
                const loc = locations.find(l => l.id === id);
                if (loc) {
                    loc.order = i;
                    newLocations.push(loc);
                }
            });
            
            locations = newLocations;

            if (isCloudMode && currentUser) {
                for (const loc of locations) {
                    await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'locations', loc.id), { order: loc.order }, { merge: true });
                }
            } else {
                saveLocal();
            }
        }

        function renderCards() {
            const grid = document.getElementById('mushroom-grid');
            grid.innerHTML = '';
            
            locations.forEach((loc) => {
                const card = document.createElement('div');
                card.className = `mushroom-card bg-white rounded-3xl p-5 border border-green-50 shadow-sm hover:shadow-md`;
                card.draggable = true;
                card.dataset.id = loc.id;

                const timeStr = loc.spawnTime 
                    ? `${loc.spawnTime.getHours().toString().padStart(2, '0')}:${loc.spawnTime.getMinutes().toString().padStart(2, '0')}:${loc.spawnTime.getSeconds().toString().padStart(2, '0')}`
                    : "-- : -- : --";

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3 gap-2">
                        <div class="drag-handle p-1 hover:text-green-600 transition-colors">
                            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="5" r="1.5"/><circle cx="15" cy="5" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="19" r="1.5"/><circle cx="15" cy="19" r="1.5"/></svg>
                        </div>
                        <div class="flex-1 min-w-0">
                            <input type="text" value="${loc.name}" onchange="window.updateName('${loc.id}', this.value)" 
                                   class="font-bold text-gray-800 leading-tight bg-transparent border-b border-transparent focus:border-green-500 outline-none w-full py-1 text-lg">
                        </div>
                        <button onclick="window.confirmDelete('${loc.id}')" class="text-gray-300 hover:text-red-500 p-1 flex-shrink-0">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                    <div class="space-y-4">
                        <div class="flex items-center gap-2">
                            <div class="flex-1"><input type="number" value="${loc.h}" placeholder="時" oninput="window.handleInput('${loc.id}', 'h', this.value)" class="w-full bg-green-50/50 border border-green-100 rounded-xl px-2 py-3 text-center font-mono focus:ring-2 focus:ring-green-500 outline-none"></div>
                            <div class="flex-1"><input type="number" value="${loc.m}" placeholder="分" oninput="window.handleInput('${loc.id}', 'm', this.value)" class="w-full bg-green-50/50 border border-green-100 rounded-xl px-2 py-3 text-center font-mono focus:ring-2 focus:ring-green-500 outline-none"></div>
                            <div class="flex-1"><input type="number" value="${loc.s}" placeholder="秒" oninput="window.handleInput('${loc.id}', 's', this.value)" class="w-full bg-green-50/50 border border-green-100 rounded-xl px-2 py-3 text-center font-mono focus:ring-2 focus:ring-green-500 outline-none"></div>
                        </div>
                        <div class="pt-3 border-t border-dashed border-green-100 flex items-center justify-between">
                            <div class="text-xl font-mono font-bold ${loc.spawnTime ? 'text-green-600' : 'text-gray-300'}">${timeStr}</div>
                            <button onclick="window.copyTime('${timeStr}')" class="text-gray-300 hover:text-green-500 p-2">
                                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" /></svg>
                            </button>
                        </div>
                    </div>
                `;
                setupDragEvents(card);
                grid.appendChild(card);
            });
        }

        window.handleInput = async (id, field, val) => {
            const loc = locations.find(l => l.id === id);
            if (!loc) return;
            loc[field] = val;
            
            const h = parseInt(loc.h) || 0, m = parseInt(loc.m) || 0, s = parseInt(loc.s) || 0;
            
            let ts = null;
            if (loc.h !== '' || loc.m !== '' || loc.s !== '') {
                ts = Date.now() + ((h * 3600) + (m * 60) + s + 300) * 1000;
                loc.spawnTime = new Date(ts);
                loc.spawnTimestamp = ts;
                loc.notified = false;
            } else {
                loc.spawnTime = null;
                loc.spawnTimestamp = null;
            }

            // 即時更新該卡片的結果顯示
            const cardEl = document.querySelector(`[data-id="${id}"]`);
            if (cardEl) {
                const resEl = cardEl.querySelector('.text-xl');
                if (loc.spawnTime) {
                    const hStr = loc.spawnTime.getHours().toString().padStart(2, '0');
                    const mStr = loc.spawnTime.getMinutes().toString().padStart(2, '0');
                    const sStr = loc.spawnTime.getSeconds().toString().padStart(2, '0');
                    resEl.textContent = `${hStr}:${mStr}:${sStr}`;
                    resEl.className = "text-xl font-mono font-bold text-green-600";
                } else {
                    resEl.textContent = "-- : -- : --";
                    resEl.className = "text-xl font-mono font-bold text-gray-300";
                }
            }

            if (isCloudMode && currentUser) {
                await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'locations', id), { ...loc, spawnTime: null }, { merge: true });
            } else {
                saveLocal();
            }
        };

        window.updateName = async (id, name) => {
            const loc = locations.find(l => l.id === id);
            if (loc) loc.name = name;
            if (isCloudMode && currentUser) {
                await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'locations', id), { name }, { merge: true });
            } else saveLocal();
        };

        window.addLocation = async () => {
            setSyncStatus('syncing');
            const id = crypto.randomUUID();
            const newLoc = { id, name: "新標點", h: '', m: '', s: '', spawnTimestamp: null, notified: false, order: -1, createdAt: Date.now() };
            
            if (isCloudMode && currentUser) {
                const updates = locations.map(l => setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'locations', l.id), { order: l.order + 1 }, { merge: true }));
                await Promise.all([...updates, setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'locations', id), { ...newLoc, order: 0 })]);
            } else {
                locations = locations.map(l => ({ ...l, order: l.order + 1 }));
                locations.unshift({ ...newLoc, order: 0, spawnTime: null });
                saveLocal();
                renderCards();
            }
            setSyncStatus('online');
        };

        window.confirmDelete = (id) => {
            deleteTargetId = id;
            document.getElementById('delete-modal').classList.remove('hidden');
        };

        window.closeDeleteModal = () => {
            deleteTargetId = null;
            document.getElementById('delete-modal').classList.add('hidden');
        };

        document.getElementById('confirm-delete-btn').onclick = async () => {
            if (!deleteTargetId) return;
            setSyncStatus('syncing');
            if (isCloudMode && currentUser) {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'locations', deleteTargetId));
            } else {
                locations = locations.filter(l => l.id !== deleteTargetId);
                saveLocal();
                renderCards();
            }
            window.closeDeleteModal();
            setSyncStatus('online');
        };

        window.toggleNotification = () => {
            const state = Notification.permission;
            if (state === 'denied') {
                alert("通知權限已被瀏覽器封鎖。請點擊網址列左側圖示，手動將通知設為「允許」。");
                return;
            }
            if (state === 'default') {
                Notification.requestPermission().then(() => {
                    isNotifEnabled = (Notification.permission === 'granted');
                    localStorage.setItem('notif_enabled', isNotifEnabled);
                    updateNotifUI();
                });
                return;
            }
            isNotifEnabled = !isNotifEnabled;
            localStorage.setItem('notif_enabled', isNotifEnabled);
            updateNotifUI();
        };

        function updateNotifUI() {
            const btn = document.getElementById('notif-btn');
            const dot = document.getElementById('notif-dot');
            const text = document.getElementById('notif-text');
            const state = Notification.permission;

            if (state === 'denied') {
                btn.className = "flex items-center gap-2 text-xs px-4 py-2 bg-red-100 text-red-700 rounded-full shadow-sm border border-red-200";
                dot.className = "w-2 h-2 rounded-full bg-red-500";
                text.textContent = "通知權限遭封鎖";
            } else if (state === 'granted') {
                if (isNotifEnabled) {
                    btn.className = "flex items-center gap-2 text-xs px-4 py-2 bg-green-600 text-white rounded-full shadow-sm border border-green-700";
                    dot.className = "w-2 h-2 rounded-full bg-white animate-pulse";
                    text.textContent = "通知：已開啟";
                } else {
                    btn.className = "flex items-center gap-2 text-xs px-4 py-2 bg-gray-200 text-gray-600 rounded-full shadow-sm border border-gray-300";
                    dot.className = "w-2 h-2 rounded-full bg-gray-400";
                    text.textContent = "通知：已關閉";
                }
            } else {
                btn.className = "flex items-center gap-2 text-xs px-4 py-2 bg-blue-500 text-white rounded-full shadow-sm hover:bg-blue-600";
                dot.className = "w-2 h-2 rounded-full bg-white";
                text.textContent = "點擊開啟通知";
            }
        }

        function checkNotifications(now) {
            if (!isNotifEnabled || Notification.permission !== 'granted') return;
            locations.forEach(loc => {
                if (!loc.spawnTime || loc.notified) return;
                const diff = Math.floor((loc.spawnTime.getTime() - now.getTime()) / 1000);
                if (diff <= 120 && diff > 0) {
                    triggerAlert(loc.name);
                    loc.notified = true;
                    if (isCloudMode && currentUser) setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'locations', loc.id), { notified: true }, { merge: true });
                }
            });
        }

        function triggerAlert(name) {
            if (isNotifEnabled && Notification.permission === 'granted') {
                const n = new Notification("菇菇重生提醒", { body: `【${name}】即將在 2 分鐘後重生！`, requireInteraction: true });
                n.onclick = () => { window.focus(); n.close(); };
            }
            playBeep();
            document.getElementById('modal-msg').innerHTML = `<span class="font-bold text-green-600 text-xl">${name}</span><br>即將在 2 分鐘後重生。`;
            document.getElementById('alert-modal').classList.remove('hidden');
        }

        window.closeAlertModal = () => document.getElementById('alert-modal').classList.add('hidden');

        function setSyncStatus(s) {
            const el = document.getElementById('sync-status');
            if (s === 'online') el.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> 雲端連線中`;
            else if (s === 'offline') el.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-orange-400"></span> 離線模式`;
            else if (s === 'syncing') el.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></span> 同步中`;
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
            checkNotifications(now);
        }, 1000);

        window.copyTime = (txt) => {
            if (txt.includes("--")) return;
            const d = document.createElement("textarea"); d.value = txt; document.body.appendChild(d); d.select(); document.execCommand("copy"); document.body.removeChild(d);
            const t = document.getElementById('toast'); t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 2000);
        };

        function playBeep() {
            try {
                const c = new (window.AudioContext || window.webkitAudioContext)();
                const o = c.createOscillator(); const g = c.createGain();
                o.type = 'sine'; o.frequency.setValueAtTime(880, c.currentTime);
                g.gain.setValueAtTime(0.1, c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + 1.5);
                o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime + 1.5);
            } catch(e) {}
        }

        init();
    </script>
</body>
</html>
