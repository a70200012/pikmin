<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮克敏菇菇重生計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto+Sans+TC', sans-serif;
            background-color: #f0fdf4;
        }
        .mushroom-card {
            transition: all 0.3s ease;
        }
        .mushroom-card:focus-within {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        /* Hide arrows in number inputs */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .modal-enter { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="p-4 md:p-8 relative min-h-screen">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="bg-white rounded-3xl p-6 mb-8 shadow-sm border border-green-100 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-green-800 flex items-center gap-2">
                    <span class="text-3xl">🍄</span> 皮克敏菇菇追蹤器
                </h1>
                <p class="text-green-600 text-sm mt-1">重生機制：破壞後 5 分鐘生成</p>
            </div>
            <div class="flex flex-col items-end gap-2">
                <div class="text-right">
                    <div class="text-sm text-gray-500 uppercase tracking-wider">目前時間</div>
                    <div id="current-time" class="text-2xl font-mono font-bold text-gray-800">00:00:00</div>
                </div>
                <button id="notif-btn" onclick="requestNotifPermission()" class="flex items-center gap-1 text-xs px-3 py-1 bg-blue-100 text-blue-700 rounded-full hover:bg-blue-200 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                    開啟通知提醒
                </button>
            </div>
        </div>

        <!-- Info Tooltip -->
        <div class="bg-blue-50 border-l-4 border-blue-400 p-4 mb-6 rounded-r-lg">
            <div class="flex">
                <div class="flex-shrink-0 text-blue-400">
                    <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1-2 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                    </svg>
                </div>
                <div class="ml-3">
                    <p class="text-sm text-blue-700">
                        設定完成後，系統會在菇菇重生的 <b>2 分鐘前</b> 彈窗提醒你準備開打。
                    </p>
                </div>
            </div>
        </div>

        <!-- Grid Container -->
        <div id="mushroom-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Cards will be generated here by JavaScript -->
        </div>

        <!-- Footer -->
        <footer class="mt-12 text-center text-gray-400 text-xs">
            <p>本工具僅供玩家計算參考使用</p>
        </footer>
    </div>

    <!-- Notification Toast (Bottom Right) -->
    <div id="toast" class="fixed bottom-4 right-4 bg-gray-800 text-white px-4 py-2 rounded-lg opacity-0 transition-opacity duration-300 pointer-events-none z-50">
        已複製時間！
    </div>

    <!-- Alert Modal Container -->
    <div id="alert-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl modal-enter">
            <div class="text-5xl mb-4">🍄</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">準備打菇菇！</h2>
            <p id="modal-msg" class="text-gray-600 mb-6">某個標點即將在 2 分鐘後重生。</p>
            <button onclick="closeModal()" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700 transition-colors shadow-lg shadow-green-200">
                我知道了
            </button>
        </div>
    </div>

    <script>
        const locations = [
            "唐獅子", "景福宮", "景福宮石燈", "集英里公告欄右瓢蟲",
            "新光獅", "流水藝術裝置", "晴光商圈 Flower Tower",
            "中山國小站2號出口", "妙道院", "集客獅",
            "吉林路美食", "薇閣精品旅館"
        ];

        // State to track spawn times and whether notification was sent
        let spawnData = {}; // { id: { time: Date, notified: boolean, name: string } }

        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false });
            document.getElementById('current-time').textContent = timeStr;

            // Check for notifications
            checkNotifications(now);
        }

        setInterval(updateClock, 1000);
        updateClock();

        const grid = document.getElementById('mushroom-grid');
        
        locations.forEach((name, index) => {
            const card = document.createElement('div');
            card.className = 'mushroom-card bg-white rounded-2xl p-5 border border-gray-100 shadow-sm hover:border-green-300';
            card.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <h3 class="font-bold text-gray-800 leading-tight">${name}</h3>
                    <span class="text-xs font-medium px-2 py-1 bg-green-50 text-green-700 rounded-full">#${index + 1}</span>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-2 font-medium">剩餘時間 (時 / 分 / 秒)</label>
                        <div class="flex items-center gap-2">
                            <div class="flex-1">
                                <input type="number" id="h-${index}" placeholder="0" min="0"
                                       oninput="updateCalc(${index})"
                                       class="w-full bg-gray-50 border border-gray-200 rounded-lg px-2 py-2 text-center text-sm focus:ring-2 focus:ring-green-500 outline-none transition-all">
                                <span class="text-[10px] text-gray-400 block text-center mt-1">時</span>
                            </div>
                            <div class="flex-1">
                                <input type="number" id="m-${index}" placeholder="0" min="0" max="59"
                                       oninput="updateCalc(${index})"
                                       class="w-full bg-gray-50 border border-gray-200 rounded-lg px-2 py-2 text-center text-sm focus:ring-2 focus:ring-green-500 outline-none transition-all">
                                <span class="text-[10px] text-gray-400 block text-center mt-1">分</span>
                            </div>
                            <div class="flex-1">
                                <input type="number" id="s-${index}" placeholder="0" min="0" max="59"
                                       oninput="updateCalc(${index})"
                                       class="w-full bg-gray-50 border border-gray-200 rounded-lg px-2 py-2 text-center text-sm focus:ring-2 focus:ring-green-500 outline-none transition-all">
                                <span class="text-[10px] text-gray-400 block text-center mt-1">秒</span>
                            </div>
                        </div>
                    </div>
                    <div class="pt-3 border-t border-dashed border-gray-100">
                        <div class="text-xs text-gray-400">預計下次生成時間</div>
                        <div class="flex items-center justify-between mt-1">
                            <div id="result-${index}" class="text-xl font-mono font-bold text-gray-300">-- : -- : --</div>
                            <button onclick="copyTime(${index})" class="text-gray-300 hover:text-green-500 transition-colors p-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });

        function updateCalc(id) {
            const h = parseInt(document.getElementById(`h-${id}`).value) || 0;
            const m = parseInt(document.getElementById(`m-${id}`).value) || 0;
            const s = parseInt(document.getElementById(`s-${id}`).value) || 0;
            const resultEl = document.getElementById(`result-${id}`);

            if (h === 0 && m === 0 && s === 0 && document.getElementById(`h-${id}`).value === "" && document.getElementById(`m-${id}`).value === "" && document.getElementById(`s-${id}`).value === "") {
                resultEl.textContent = "-- : -- : --";
                resultEl.className = "text-xl font-mono font-bold text-gray-300";
                delete spawnData[id];
                return;
            }

            const totalSeconds = (h * 3600) + (m * 60) + s;
            const now = new Date();
            const spawnTime = new Date(now.getTime() + (totalSeconds + 300) * 1000);
            
            const hoursStr = spawnTime.getHours().toString().padStart(2, '0');
            const minsStr = spawnTime.getMinutes().toString().padStart(2, '0');
            const secsStr = spawnTime.getSeconds().toString().padStart(2, '0');
            
            resultEl.textContent = `${hoursStr}:${minsStr}:${secsStr}`;
            resultEl.className = "text-xl font-mono font-bold text-green-600";

            // Save to tracking state
            spawnData[id] = {
                time: spawnTime,
                notified: false,
                name: locations[id]
            };
        }

        function checkNotifications(now) {
            for (const id in spawnData) {
                const data = spawnData[id];
                if (data.notified) continue;

                const diffMs = data.time.getTime() - now.getTime();
                const diffSecs = Math.floor(diffMs / 1000);

                // If less than or equal to 120 seconds (2 minutes)
                if (diffSecs <= 120 && diffSecs > 0) {
                    triggerAlert(data.name);
                    data.notified = true;
                }
            }
        }

        function triggerAlert(locationName) {
            // 1. Browser Notification
            if (Notification.permission === "granted") {
                new Notification("菇菇提醒！", {
                    body: `${locationName} 將在 2 分鐘後重生，準備開打！`,
                    icon: "https://cdn-icons-png.flaticon.com/512/3579/3579130.png"
                });
            }

            // 2. Play subtle sound
            playBeep();

            // 3. Custom Modal Alert
            const modal = document.getElementById('alert-modal');
            const msg = document.getElementById('modal-msg');
            msg.innerHTML = `<span class="font-bold text-green-600">${locationName}</span><br>即將在 2 分鐘後重生。`;
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('alert-modal').classList.add('hidden');
        }

        function requestNotifPermission() {
            if (!("Notification" in window)) {
                alert("此瀏覽器不支持桌面通知");
                return;
            }

            Notification.requestPermission().then(permission => {
                const btn = document.getElementById('notif-btn');
                if (permission === "granted") {
                    btn.textContent = "通知功能已開啟";
                    btn.classList.replace('bg-blue-100', 'bg-green-100');
                    btn.classList.replace('text-blue-700', 'text-green-700');
                } else {
                    btn.textContent = "通知權限被拒絕";
                    btn.classList.replace('bg-blue-100', 'bg-red-100');
                    btn.classList.replace('text-blue-700', 'text-red-700');
                }
            });
        }

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime); // A5
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 1);
            } catch (e) { console.log("Audio failed"); }
        }

        function copyTime(id) {
            const text = document.getElementById(`result-${id}`).textContent;
            if (text.includes("--")) return;
            
            const dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);

            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2000);
        }
    </script>
</body>
</html>
